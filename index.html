<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlroot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zubair Automotive Group — Workshop Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js" defer></script>
<style>
  :root{
    --bg:#f4f3ef; --surface:#ffffff; --line:#e2e0d8; --ink:#1f1d18;
    --ink-soft:#6b6a62; --accent:#c4501f; --accent-soft:#f6e4da;
    --in:#3b6d11; --in-bg:#eaf3de; --out:#993556; --out-bg:#fbeaf0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:'Tajawal', sans-serif; font-size:15px; line-height:1.6;
    min-height:100vh;
  }
  body.lang-en{font-family:'Inter', sans-serif;}
  .app{max-width:520px; margin:0 auto; padding-bottom:90px;}
  header{
    background:var(--ink); color:#fff; padding:16px 16px 14px;
    position:sticky; top:0; z-index:10;
  }
  .header-top{display:flex; align-items:center; gap:10px; justify-content:space-between;}
  .brand{display:flex; align-items:center; gap:10px;}
  .brand img{width:38px; height:38px; border-radius:50%; background:#fff; flex-shrink:0;}
  .brand-text h1{margin:0; font-size:15px; font-weight:700; line-height:1.3;}
  .brand-text p{margin:1px 0 0; font-size:11px; color:#cfcbc0;}
  header h2{margin:10px 0 0; font-size:13px; font-weight:500; color:#e7e4da;}
  .lang-btn{
    border:1px solid #555; background:none; color:#fff; padding:6px 12px; border-radius:20px;
    font-family:inherit; font-size:12.5px; font-weight:500; cursor:pointer; flex-shrink:0;
  }
  nav{
    display:flex; background:var(--surface); border-bottom:1px solid var(--line);
    position:sticky; top:78px; z-index:9; overflow-x:auto;
  }
  nav button{
    flex:1; border:none; background:none; padding:12px 6px; font-family:inherit;
    font-size:12.5px; font-weight:500; color:var(--ink-soft); cursor:pointer;
    border-bottom:3px solid transparent; white-space:nowrap;
  }
  nav button.active{color:var(--accent); border-bottom-color:var(--accent);}
  main{padding:16px;}
  .page{display:none;}
  .page.active{display:block;}
  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:12px;
    padding:16px; margin-bottom:14px;
  }
  label{display:block; font-size:12.5px; color:var(--ink-soft); margin:0 0 5px; font-weight:500;}
  select, input, textarea{
    width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:8px;
    font-family:inherit; font-size:15px; background:#fff; color:var(--ink); margin-bottom:14px;
  }
  select:focus, input:focus, textarea:focus{outline:2px solid var(--accent-soft); border-color:var(--accent);}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .seg{display:flex; gap:8px; margin-bottom:16px;}
  .seg button{
    flex:1; padding:12px; border-radius:8px; border:1.5px solid var(--line);
    background:#fff; font-family:inherit; font-weight:700; font-size:14px;
    color:var(--ink-soft); cursor:pointer;
  }
  .seg button.sel-in.on{background:var(--in-bg); color:var(--in); border-color:var(--in);}
  .seg button.sel-out.on{background:var(--out-bg); color:var(--out); border-color:var(--out);}
  .btn-primary{
    width:100%; padding:13px; background:var(--accent); color:#fff; border:none;
    border-radius:8px; font-family:inherit; font-size:15px; font-weight:700; cursor:pointer;
  }
  .btn-primary:active{opacity:0.85;}
  .btn-primary:disabled{opacity:0.6;}
  .btn-line{
    width:100%; padding:11px; background:#fff; color:var(--ink); border:1px solid var(--line);
    border-radius:8px; font-family:inherit; font-size:13.5px; font-weight:500; cursor:pointer; margin-top:8px;
  }
  .btn-soft{
    padding:8px 14px; background:var(--accent-soft); color:var(--accent); border:none;
    border-radius:20px; font-family:inherit; font-size:12.5px; font-weight:700; cursor:pointer;
  }
  .pill{display:inline-block; padding:3px 9px; border-radius:20px; font-size:11.5px; font-weight:700;}
  .pill.in{background:var(--in-bg); color:var(--in);}
  .pill.out{background:var(--out-bg); color:var(--out);}
  .rec{
    background:#fff; border:1px solid var(--line); border-radius:10px; padding:10px 12px;
    margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; gap:10px;
  }
  .rec .meta{font-size:12px; color:var(--ink-soft);}
  .rec .model{font-weight:700; font-size:14.5px;}
  .rec .del{background:none; border:none; color:#b3503b; font-size:18px; cursor:pointer; padding:4px;}
  .filters{display:flex; gap:8px; margin-bottom:12px;}
  .filters select, .filters input{margin-bottom:0;}
  .empty{text-align:center; color:var(--ink-soft); padding:30px 10px; font-size:13.5px;}
  .stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;}
  .stat{background:#fff; border:1px solid var(--line); border-radius:10px; padding:12px;}
  .stat .num{font-size:24px; font-weight:700; color:var(--accent);}
  .stat .lbl{font-size:12px; color:var(--ink-soft); margin-top:2px;}
  h3{font-size:14px; font-weight:700; margin:0 0 10px;}
  .row-between{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .row-between h3{margin:0;}
  .tag-list{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px;}
  .tag{
    display:flex; align-items:center; gap:6px; background:var(--accent-soft); color:var(--accent);
    padding:6px 10px; border-radius:20px; font-size:13px; font-weight:500;
  }
  .tag button{border:none; background:none; color:var(--accent); font-size:14px; cursor:pointer; padding:0; line-height:1;}
  .add-row{display:flex; gap:8px;}
  .add-row input{margin-bottom:0;}
  .add-row button{
    padding:0 16px; border-radius:8px; border:none; background:var(--ink); color:#fff;
    font-family:inherit; font-weight:700; cursor:pointer;
  }
  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--ink);
    color:#fff; padding:10px 18px; border-radius:30px; font-size:13.5px; z-index:50;
    opacity:0; transition:opacity .25s; pointer-events:none; max-width:90%; text-align:center;
  }
  .toast.show{opacity:1;}
  .loading{text-align:center; padding:40px; color:var(--ink-soft); font-size:13px;}
  .hint{font-size:12.5px; color:var(--ink-soft); margin:0 0 8px;}
  .lock-wrap{text-align:center; padding:30px 10px;}
  .lock-wrap p{font-size:13.5px; color:var(--ink-soft); margin:8px 0 16px;}
  .lock-wrap input{text-align:center; font-size:20px; letter-spacing:4px; max-width:200px; margin:0 auto 12px;}
  .lock-wrap .btn-primary{max-width:200px; margin:0 auto;}
</style>
</head>

let LANG = 'ar';
let CONFIG = { employees: [], models: [], pin: '1234' };

const DEFAULT_EMPLOYEES = ['ياسر / Yasir','راتشيه / Rateshe','عبدالله / Abdullah','حامد / Hamed','طلال / Talal'];
const DEFAULT_MODELS = ['Lancer','Outlander','Montero','ASX','PAJERO','L200','Xpander','Attrage','Mirage','Xforce'];

function t(key){ return TEXT[LANG][key]; }

function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2200);
}

function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function nowTimeStr(){
  const d = new Date();
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
function ddmmyyyy(iso){
  const [y,m,d] = iso.split('-');
  return d+'.'+m+'.'+y;
}
function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------------- Storage (Firebase Realtime Database) ---------------- */
const DB_URL = 'https://zubair-workshop-default-rtdb.asia-southeast1.firebasedatabase.app';

async function fbGet(path){
  const res = await fetch(`${DB_URL}/${path}.json`, { cache:'no-store' });
  if(!res.ok) throw new Error('fb get failed: '+res.status);
  return await res.json();
}
async function fbSet(path, value){
  const res = await fetch(`${DB_URL}/${path}.json`, {
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(value)
  });
  if(!res.ok) throw new Error('fb set failed: '+res.status);
}

async function loadConfig(){
  try{
    const c = await fbGet('config');
    if(c){
      CONFIG = c;
      if(!CONFIG.pin) CONFIG.pin = '1234';
      if(!CONFIG.employees) CONFIG.employees = DEFAULT_EMPLOYEES.slice();
      if(!CONFIG.models) CONFIG.models = DEFAULT_MODELS.slice();
    }else{
      CONFIG = { employees: DEFAULT_EMPLOYEES.slice(), models: DEFAULT_MODELS.slice(), pin:'1234' };
      await fbSet('config', CONFIG);
    }
  }catch(e){
    CONFIG = { employees: DEFAULT_EMPLOYEES.slice(), models: DEFAULT_MODELS.slice(), pin:'1234' };
    throw e;
  }
}
async function saveConfig(){
  await fbSet('config', CONFIG);
}
function recordsObjToArr(obj){
  if(!obj) return [];
  return Object.values(obj);
}
function recordsArrToObj(arr){
  const obj = {};
  arr.forEach(r=>{ obj[r.id] = r; });
  return obj;
}
async function loadRecords(){
  const obj = await fbGet('records');
  RECORDS = recordsObjToArr(obj);
}
async function saveRecords(){
  await fbSet('records', recordsArrToObj(RECORDS));
}
async function mutateConfig(fn){
  await loadConfig();
  CONFIG = fn(CONFIG);
  await saveConfig();
}
async function mutateRecords(fn){
  await loadRecords();
  RECORDS = fn(RECORDS);
  await saveRecords();
}

/* ---------------- Direction / form ---------------- */
function populateSelect(sel, items, placeholder){
  sel.innerHTML = '';
  if(placeholder){
    const o = document.createElement('option');
    o.value=''; o.textContent = placeholder;
    sel.appendChild(o);
  }
  items.forEach(it=>{
    const o = document.createElement('option');
    o.value = it; o.textContent = it;
    sel.appendChild(o);
  });
}

function setDirection(d){
  direction = d;
  document.getElementById('seg-in').classList.toggle('on', d==='in');
  document.getElementById('seg-out').classList.toggle('on', d==='out');
}

async function submitRecord(){
  const employee = document.getElementById('f-employee').value;
  const model = document.getElementById('f-model').value;
  const reg = document.getElementById('f-reg').value.trim();
  const time = document.getElementById('f-time').value;
  const date = document.getElementById('f-date').value;
  const notes = document.getElementById('f-notes').value.trim();

  if(!employee || !model || !date || !time){
    showToast(t('fillRequired'));
    return;
  }

  const rec = {
    id: Date.now().toString(36)+Math.random().toString(36).slice(2,7),
    direction, employee, model, reg, time, date, notes,
    createdAt: new Date().toISOString()
  };

  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  try{
    await mutateRecords(list => [...list, rec]);
    showToast(direction==='in' ? t('inSaved') : t('outSaved'));
    document.getElementById('f-reg').value = '';
    document.getElementById('f-notes').value = '';
    document.getElementById('f-time').value = nowTimeStr();
  }catch(e){
    showToast(t('saveFailed'));
  }finally{
    btn.disabled = false;
  }
}

async function manualRefresh(){
  try{
    await loadRecords();
    await loadConfig();
    renderProtectedPages();
  }catch(e){ showToast(t('loadFailed')); }
}

function renderRecordsList(){
  const empSel = document.getElementById('rf-employee');
  const dirSel = document.getElementById('rf-direction');
  if(!empSel || !dirSel) return;
  const empFilter = empSel.value;
  const dirFilter = dirSel.value;
  let list = RECORDS.slice().sort((a,b)=> b.createdAt.localeCompare(a.createdAt));
  if(empFilter) list = list.filter(r=>r.employee===empFilter);
  if(dirFilter) list = list.filter(r=>r.direction===dirFilter);

  const wrap = document.getElementById('records-list');
  if(list.length===0){
    wrap.innerHTML = `<div class="empty">${t('noMatch')}</div>`;
    return;
  }
  wrap.innerHTML = list.map(r=>`
    <div class="rec">
      <div>
        <span class="pill ${r.direction}">${r.direction==='in'?t('typeIn'):t('typeOut')}</span>
        <div class="model" style="margin-top:4px;">${escapeHtml(r.model)} ${r.reg?('— '+escapeHtml(r.reg)):''}</div>
        <div class="meta">${escapeHtml(r.employee)} · ${r.date} · ${r.time}${r.notes? (' · '+escapeHtml(r.notes)) : ''}</div>
      </div>
      <button class="del" aria-label="delete" onclick="deleteRecord('${r.id}')">×</button>
    </div>
  `).join('');
}

async function deleteRecord(id){
  if(!isAdmin) return;
  try{
    await mutateRecords(list => list.filter(r=>r.id!==id));
    renderRecordsList();
    renderDashboardPage();
    showToast(t('deleted'));
  }catch(e){ showToast(t('saveFailed')); }
}

async function clearAllRecords(){
  if(!isAdmin) return;
  if(!confirm(t('confirmClear'))) return;
  try{
    await mutateRecords(()=>[]);
    renderRecordsList();
    renderDashboardPage();
    showToast(t('allDeleted'));
  }catch(e){ showToast(t('saveFailed')); }
}

function exportExcel(){
  if(!isAdmin) return;
  if(typeof XLSX === 'undefined'){ showToast(LANG==='ar' ? 'المكتبة لسا تحمّل، حاول بعد ثانيتين' : 'Library still loading, try again in a moment'); return; }
  if(RECORDS.length===0){ showToast(t('noDataExport')); return; }
  const wb = XLSX.utils.book_new();

  CONFIG.employees.forEach(emp=>{
    const empRecords = RECORDS.filter(r=>r.employee===emp);
    if(empRecords.length===0) return;

    const dates = [...new Set(empRecords.map(r=>r.date))].sort();
    const rows = [];
    rows.push(['IN','','','','OUT','','','']);
    rows.push(['MODEL','Reg','Time','Date','MODEL','REG','TIME','Date']);

    const merges = [
      { s:{r:0,c:0}, e:{r:0,c:3} },
      { s:{r:0,c:4}, e:{r:0,c:7} }
    ];

    dates.forEach(date=>{
      const ins = empRecords.filter(r=>r.date===date && r.direction==='in').sort((a,b)=>a.time.localeCompare(b.time));
      const outs = empRecords.filter(r=>r.date===date && r.direction==='out').sort((a,b)=>a.time.localeCompare(b.time));
      const maxLen = Math.max(ins.length, outs.length);
      for(let i=0;i<maxLen;i++){
        const a = ins[i];
        const b = outs[i];
        rows.push([
          a?a.model:'', a?a.reg:'', a?a.time:'', a?ddmmyyyy(a.date):'',
          b?b.model:'', b?b.reg:'', b?b.time:'', b?ddmmyyyy(b.date):''
        ]);
      }
      const dateRowIndex = rows.length;
      rows.push([ddmmyyyy(date),'','','','','','','']);
      merges.push({ s:{r:dateRowIndex,c:0}, e:{r:dateRowIndex,c:7} });
    });

    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!merges'] = merges;
    ws['!cols'] = [{wch:11},{wch:11},{wch:9},{wch:11},{wch:11},{wch:11},{wch:9},{wch:11}];
    const sheetName = emp.slice(0,31).replace(/[\\\/\?\*\[\]:]/g,'');
    XLSX.utils.book_append_sheet(wb, ws, sheetName || 'Sheet');
  });

  const unassigned = RECORDS.filter(r=>!CONFIG.employees.includes(r.employee));
  if(unassigned.length>0){
    const rows = [['NAME','TYPE','MODEL','REG','TIME','DATE','NOTES']];
    unassigned.forEach(r=>{
      rows.push([r.employee, r.direction.toUpperCase(), r.model, r.reg, r.time, ddmmyyyy(r.date), r.notes]);
    });
    const ws = XLSX.utils.aoa_to_sheet(rows);
    XLSX.utils.book_append_sheet(wb, ws, 'Other');
  }

  XLSX.writeFile(wb, 'workshop-records-'+todayStr()+'.xlsx');
}

/* ---------------- Reports (print / save as PDF) ---------------- */
function onReportRangeChange(){
  const v = document.getElementById('rep-range').value;
  document.getElementById('rep-custom-dates').style.display = v==='custom' ? 'grid' : 'none';
}

function getReportDateRange(){
  const rangeType = document.getElementById('rep-range').value;
  let from, to;
  const today = new Date();
  if(rangeType==='week'){
    const start = new Date(today);
    start.setDate(today.getDate() - today.getDay());
    from = isoOf(start); to = todayStr();
  }else if(rangeType==='month'){
    const start = new Date(today.getFullYear(), today.getMonth(), 1);
    from = isoOf(start); to = todayStr();
  }else{
    from = document.getElementById('rep-from').value;
    to = document.getElementById('rep-to').value;
  }
  return { rangeType, from, to };
}
function isoOf(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

        <span>${t('reportTotalRows')(list.length)}</span>
      </div>
      ${sectionsHtml}
      <div class="rep-footer">${t('companyName')} — ${t('companySub')}</div>
    </body>
    </html>
  `;

  const win = window.open('', '_blank');
  if(!win){ showToast(LANG==='ar' ? 'يرجى السماح بالنوافذ المنبثقة' : 'Please allow pop-ups for this site'); return; }
  win.document.open();
  win.document.write(printHtml);
  win.document.close();
}

/* ---------------- Dashboard ---------------- */
let modelsChart = null;
function renderDashboardPage(){
  const wrap = document.getElementById('dashboard-protected');
  if(!isAdmin){ wrap.innerHTML = lockScreenHtml('dash-lock'); return; }

  wrap.innerHTML = `
    <div class="row-between">
      <h3 style="margin:0;">${t('navDashboard')}</h3>
      <button class="btn-soft" onclick="manualRefresh()">${t('refresh')}</button>
    </div>
    <div class="stat-grid" id="stat-grid"></div>
    <div id="overdue-alert"></div>
    <div class="card">
      <h3>${t('chartTitle')}</h3>
      <div style="position:relative; height:220px;">
        <canvas id="chart-models" role="img" aria-label="${t('chartTitle')}"></canvas>
      </div>
    </div>
    <div class="card">
      <h3>${t('inWorkshopTitle')}</h3>
      <div id="in-workshop-list"></div>
    </div>
  `;

  const today = todayStr();
  const todayIn  = RECORDS.filter(r=>r.date===today && r.direction==='in').length;
  const todayOut = RECORDS.filter(r=>r.date===today && r.direction==='out').length;
  const totalIn  = RECORDS.filter(r=>r.direction==='in').length;
  const inWorkshop = computeInWorkshop();

  document.getElementById('stat-grid').innerHTML = `
    <div class="stat"><div class="num" style="color:var(--in);">${todayIn}</div><div class="lbl">${t('statTodayIn')}</div></div>
    <div class="stat"><div class="num" style="color:var(--out);">${todayOut}</div><div class="lbl">${t('statTodayOut')}</div></div>
    <div class="stat"><div class="num">${inWorkshop.length}</div><div class="lbl">${t('statInNow')}</div></div>
    <div class="stat"><div class="num">${totalIn}</div><div class="lbl">${t('statTotalIn')}</div></div>
  `;

  /* --- overdue alert (> 7 days) --- */
  const overdue = inWorkshop.filter(r=>{
    const days = Math.floor((new Date() - new Date(r.date)) / 86400000);
    return days >= 7;
  });
  const alertWrap = document.getElementById('overdue-alert');
  if(overdue.length>0){
    alertWrap.innerHTML = `
      <div class="card" style="border-color:#c4501f; background:#fdf3ee;">
        <h3 style="color:#c4501f; margin-bottom:10px;">${t('alertTitle')} (${overdue.length})</h3>
        ${overdue.map(r=>{
          const days = Math.floor((new Date() - new Date(r.date)) / 86400000);
          return `<div class="rec" style="border-color:#f6c6b0;">
            <div>
              <div class="model" style="color:#c4501f;">${escapeHtml(r.model)} ${r.reg?'— '+escapeHtml(r.reg):''}</div>
              <div class="meta">${escapeHtml(r.employee)} · دخلت ${r.date} · <strong>${t('daysIn')(days)}</strong></div>
            </div>
          </div>`;
        }).join('')}
      </div>
    `;
  } else {
    alertWrap.innerHTML = '';
  }

  /* --- IN-only models chart --- */
  const counts = {};
  RECORDS.filter(r=>r.direction==='in').forEach(r=>{ counts[r.model]=(counts[r.model]||0)+1; });
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const labels = sorted.map(s=>s[0]);
  const data   = sorted.map(s=>s[1]);

  const ctx = document.getElementById('chart-models');
  if(modelsChart) modelsChart.destroy();
  if(labels.length>0 && typeof Chart !== 'undefined'){
    modelsChart = new Chart(ctx, {
      type:'bar',
      data:{ labels, datasets:[{ label:'IN', data, backgroundColor:'#c4501f' }] },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ display:false } },
        scales:{ y:{ beginAtZero:true, ticks:{ precision:0 } } }
      }
    });
  }

  /* --- cars in workshop now --- */
  const wsWrap = document.getElementById('in-workshop-list');
  if(inWorkshop.length===0){
    wsWrap.innerHTML = `<div class="empty">${t('noneInWorkshop')}</div>`;
  }else{
    wsWrap.innerHTML = `<div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;">
      ${inWorkshop.map(r=>{
        const days = Math.floor((new Date() - new Date(r.date)) / 86400000);
        const isOld = days >= 7;
        const badgeBg = isOld ? '#f5c4b3' : 'var(--in-bg)';
        const badgeColor = isOld ? '#993c1d' : 'var(--in)';
        const cardBg = isOld ? '#fdf3ee' : 'var(--surface)';
        const cardBorder = isOld ? '#f0997b' : 'var(--line)';
        const dividerColor = isOld ? '#f0997b' : 'var(--line)';
        return `<div style="background:${cardBg};border:1px solid ${cardBorder};border-radius:12px;padding:12px;">
          <div style="font-size:12px;font-weight:700;color:${badgeColor};background:${badgeBg};display:inline-block;padding:2px 8px;border-radius:20px;margin-bottom:8px;">${isOld?'⚠️ ':''} ${days} ${LANG==='ar'?'يوم':'d'}</div>
          <div style="font-size:15px;font-weight:700;color:var(--ink);">${escapeHtml(r.model)}</div>
          <div style="font-size:13px;color:var(--ink-soft);margin-top:2px;">${escapeHtml(r.reg)||'—'}</div>
          <div style="font-size:11px;color:var(--ink-soft);margin-top:6px;border-top:1px solid ${dividerColor};padding-top:6px;">${escapeHtml(r.employee)} · ${r.date}</div>
        </div>`;
      }).join('')}
    </div>`;
  }
}

function computeInWorkshop(){
  const norm = s => (s||'').trim().toUpperCase();
  const ins = RECORDS.filter(r=>r.direction==='in').sort((a,b)=> a.date.localeCompare(b.date) || a.time.localeCompare(b.time));
  const outs = RECORDS.filter(r=>r.direction==='out');
  const usedOut = new Set();
  const stillIn = [];
  ins.forEach(inRec=>{
    const inReg = norm(inRec.reg);
    const matchIdx = outs.findIndex((o,i)=>{
      if(usedOut.has(i)) return false;
      const outReg = norm(o.reg);
      if(!inReg || !outReg) return false;
      return outReg === inReg && o.date+o.time >= inRec.date+inRec.time;
    });
    if(matchIdx>-1){ usedOut.add(matchIdx); }
    else{ stillIn.push(inRec); }
  });
  return stillIn;
}

  const wrap = document.getElementById('settings-protected');
  if(!isAdmin){ wrap.innerHTML = lockScreenHtml('settings-lock'); return; }

  wrap.innerHTML = `
    <div class="card">
      <h3>${t('staffListTitle')}</h3>
      <div class="tag-list" id="employees-tags"></div>
      <div class="add-row">
        <input id="new-employee" placeholder="${t('newStaffPh')}">
        <button onclick="addEmployee()">${t('add')}</button>
      </div>
    </div>
    <div class="card">
      <h3>${t('modelsTitle')}</h3>
      <div class="tag-list" id="models-tags"></div>
      <div class="add-row">
        <input id="new-model" placeholder="${t('newModelPh')}">

      </div>

async function changePin(){
  const inp = document.getElementById('new-pin');
  const v = inp.value.trim();
  if(v.length<4){ showToast(t('pinTooShort')); return; }
  try{
    await mutateConfig(cfg => ({...cfg, pin:v}));
    inp.value='';
    showToast(t('pinSaved'));
  }catch(e){ showToast(t('saveFailed')); }
}

async function addEmployee(){
  const inp = document.getElementById('new-employee');
  const v = inp.value.trim();
  if(!v) return;
  if(CONFIG.employees.includes(v)){ showToast(t('nameExists')); return; }
  try{
    await mutateConfig(cfg => ({...cfg, employees:[...cfg.employees, v]}));
    inp.value='';
    renderSettingsLists();
    refreshFormSelects();
  }catch(e){ showToast(t('saveFailed')); }
}
async function removeEmployee(name){
  try{
    await mutateConfig(cfg => ({...cfg, employees: cfg.employees.filter(e=>e!==name)}));
    renderSettingsLists();
    refreshFormSelects();
  }catch(e){ showToast(t('saveFailed')); }
}
async function addModel(){
  const inp = document.getElementById('new-model');
  const v = inp.value.trim();
  if(!v) return;
  if(CONFIG.models.includes(v)){ showToast(t('modelExists')); return; }
  try{
    await mutateConfig(cfg => ({...cfg, models:[...cfg.models, v]}));
    inp.value='';
    renderSettingsLists();
    refreshFormSelects();
  }catch(e){ showToast(t('saveFailed')); }
}
async function removeModel(name){
  try{
    await mutateConfig(cfg => ({...cfg, models: cfg.models.filter(m=>m!==name)}));
    renderSettingsLists();
    refreshFormSelects();
  }catch(e){ showToast(t('saveFailed')); }
}

function renderSettingsLists(){
  const empWrap = document.getElementById('employees-tags');
  const modWrap = document.getElementById('models-tags');
  if(!empWrap || !modWrap) return;
  empWrap.innerHTML = CONFIG.employees.map(e=>`
    <span class="tag">${escapeHtml(e)}<button aria-label="remove" onclick="removeEmployee('${e.replace(/'/g,"\\'")}')">×</button></span>
  `).join('');
  modWrap.innerHTML = CONFIG.models.map(m=>`
    <span class="tag">${escapeHtml(m)}<button aria-label="remove" onclick="removeModel('${m.replace(/'/g,"\\'")}')">×</button></span>
  `).join('');
}

function refreshFormSelects(){
  populateSelect(document.getElementById('f-employee'), CONFIG.employees, null);
  populateSelect(document.getElementById('f-model'), CONFIG.models, null);
  const rfEmp = document.getElementById('rf-employee');
  if(rfEmp) populateSelect(rfEmp, CONFIG.employees, t('allStaff'));
  const repEmp = document.getElementById('rep-employee');
  if(repEmp) populateSelect(repEmp, CONFIG.employees, t('allStaff'));
}

document.querySelectorAll('nav button').forEach(btn=>{
  btn.addEventListener('click', async ()=>{
    document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('page-'+btn.dataset.page).classList.add('active');
    if(btn.dataset.page==='records' || btn.dataset.page==='dashboard' || btn.dataset.page==='settings'){
      if(isAdmin){
        try{ await loadConfig(); await loadRecords(); }catch(e){ showToast(t('loadFailed')); }
      }
      renderProtectedPages();
    }
  });
});

    await loadRecords();
  }catch(e){
    showToast(t('loadFailed'));
